name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run Go tests
        run: cd core && go test ./... -v -timeout 60s

  bridge-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: cd bridge && npm ci
      - name: Run Bridge tests
        run: cd bridge && npm test

  build:
    runs-on: ubuntu-latest
    needs: [go-test, bridge-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build Go Core
        run: cd core && go build -o tlive ./cmd/tlive/
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build Bridge
        run: cd bridge && npm ci && npm run build
