name: Release
on:
  push:
    tags: ['v*']

jobs:
  build-go:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd core
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          CGO_ENABLED=0 go build -ldflags="-s -w" -o "tlive-${GOOS}-${GOARCH}${ext}" ./cmd/tlive/
      - uses: actions/upload-artifact@v4
        with:
          name: tlive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: core/tlive-*

  release:
    needs: build-go
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: tlive-*
