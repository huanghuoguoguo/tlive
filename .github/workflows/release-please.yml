name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.8.0)'
        required: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  get-tag:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ "${{ inputs.tag }}" != "" ]]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=" >> $GITHUB_OUTPUT
          fi

  build-go:
    needs: [release-please, get-tag]
    if: ${{ needs.release-please.outputs.release_created == 'true' || needs.get-tag.outputs.tag != '' }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd core
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          CGO_ENABLED=0 go build -ldflags="-s -w" -o "tlive-${GOOS}-${GOARCH}${ext}" ./cmd/tlive/
      - uses: actions/upload-artifact@v4
        with:
          name: tlive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: core/tlive-*

  test-bridge:
    needs: [release-please, get-tag]
    if: ${{ needs.release-please.outputs.release_created == 'true' || needs.get-tag.outputs.tag != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install, test, build
        working-directory: bridge
        run: |
          npm install
          npm test
          npm run build

  upload-assets:
    needs: [release-please, get-tag, build-go, test-bridge]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Get tag name
        id: tag
        run: |
          if [[ "${{ needs.release-please.outputs.tag_name }}" != "" ]]; then
            echo "tag=${{ needs.release-please.outputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ needs.get-tag.outputs.tag }}" >> $GITHUB_OUTPUT
          fi
      - name: Create release if not exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.tag.outputs.tag }}" || gh release create "${{ steps.tag.outputs.tag }}" --title "${{ steps.tag.outputs.tag }}" --notes "Release ${{ steps.tag.outputs.tag }}"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: tlive-*