schema: spec-driven

# Project context - shown to AI when creating artifacts
context: |
  Project: tlive - IM bridge for Claude Code

  Tech stack:
    - TypeScript (ES2022 target, strict mode)
    - Node.js 20+
    - esbuild for bundling
    - Vitest for testing
    - Claude Agent SDK for AI interaction

  Architecture:
    - src/channels/ - IM platform adapters (Telegram, Feishu, QQ Bot)
    - src/providers/ - AI provider integrations (Claude SDK, live session)
    - src/engine/ - Core engine with submodules:
      - commands/ - Command registry and handlers (status, new, cd, project, etc.)
      - coordinators/ - Orchestrators (bridge-manager, query, permission, ingress)
      - state/ - State managers (session, workspace, recent-projects)
      - presenters/ - UI builders (home-payload-builder)
      - messages/ - Message processing (presenter, renderer, callback-dispatcher)
      - automation/ - Webhook server and cron scheduler
      - sdk/ - SDK engine wrapper
      - types/ - Shared type definitions
    - src/formatting/ - Message formatting and types
    - src/permissions/ - Permission gateway and broker
    - src/canonical/ - Claude adapter and canonical event schema
    - src/delivery/ - Message delivery coordination
    - src/i18n/ - Internationalization (en, zh)
    - src/markdown/ - Markdown processing
    - src/ui/ - UI components and helpers
    - src/store/ - Persistence layer
    - src/utils/ - Utility functions
    - src/__tests__/ - Unit/integration tests

  Key dependencies:
    - @anthropic-ai/claude-agent-sdk
    - grammy (Telegram)
    - @larksuiteoapi/node-sdk (Feishu/Lark)
    - ws, zod

  Code conventions:
    - Utility functions go in src/utils/
    - Constants go in src/utils/constants.ts
    - New features must have unit tests in src/__tests__/
    - Use Biome for linting, knip for dead code detection
    - Commands use registry pattern (src/engine/commands/registry.ts)
    - i18n strings go in src/i18n/{locale}.ts with type safety
    - State management via dedicated managers (session, workspace, recent-projects)

  Git workflow:
    - main branch is protected, no direct pushes
    - Feature branches: feat/xxx
    - Fix branches: fix/xxx
    - All changes via Pull Request (squash merge)
    - Do NOT publish versions without user approval

  Important rules:
    - Do NOT create documentation files (.md, README) unless explicitly requested
    - Do NOT add docstrings/comments unless logic is non-obvious
    - Do NOT add error handling for scenarios that can't happen
    - Trust internal code and framework guarantees
    - Only validate at system boundaries (user input, external APIs)
    - Skills (like /commit, /review) are transparently passed to Claude Code
    - Commands starting with / are first checked against tlive's command registry
    - If not found in registry, the message is forwarded to Claude Code SDK

# Per-artifact rules (optional)
rules:
  proposal:
    - Keep proposals focused and concise
    - Consider the existing architecture before proposing changes
    - New features should include test plan
  tasks:
    - Break tasks into small, actionable steps
    - Reference existing files and patterns where possible
    - Include test requirements for new functionality
